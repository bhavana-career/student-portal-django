{% extends "base.html" %}
{% block content %}
<h2>Enrolled Students</h2>

<form method="get">
  <label for="course">Select Course:</label>
  <select name="course" id="course">
    {% for course in courses %}
      <option value="{{ course.subcode }}" {% if course.subcode == selected_course %}selected{% endif %}>
        {{ course.subcode }} - {{ course.subname }}
      </option>
    {% endfor %}
  </select>
  <button type="submit">Search</button>
</form>

{% if students %}
  <table border="1" cellpadding="6">
    <tr>
      <th>#</th><th>USN</th><th>Name</th><th>Semester</th>
    </tr>
    {% for s in students %}
      <tr>
        <td>{{ forloop.counter }}</td>
        <td>{{ s.usn }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.sem }}</td>
      </tr>
    {% endfor %}
  </table>
{% else %}
  <p>No students enrolled.</p>
{% endif %}
{% endblock %}
