{% extends 'base.html' %}

{% block content %}

<h2>Student List</h2>

<table border="1">

<tr>
<th>Sl.no</th>
<th>USN</th>
<th>NAME</th>
<th>SEM</th>

</tr>

{% for s in students %}

<tr>
<td>{{forloop.counter}}</td>
<td>{{s.usn}}</td>
<td>{{s.name}}</td>
<td>{{s.sem}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
